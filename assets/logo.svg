<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Define linear and radial gradients for the premium orange look -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A50" />
      <stop offset="100%" stop-color="#E95420" />
    </linearGradient>
    <linearGradient id="secondary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB095" />
      <stop offset="100%" stop-color="#FF5B26" />
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E95420" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#E95420" stop-opacity="0" />
    </radialGradient>
    
    <!-- Filter for modern drop shadow/glow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations for high-fidelity interactive feels */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 4px #E95420); }
    }
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    @keyframes rotate-orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .floating-core {
      transform-origin: 50px 50px;
      animation: float 4s ease-in-out infinite;
    }
    .pulsing-node {
      transform-origin: center;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .pulsing-node-delayed {
      transform-origin: center;
      animation: pulse 2.5s ease-in-out infinite;
      animation-delay: 1.25s;
    }
    .path-stream {
      stroke-dasharray: 5, 15;
      animation: dash 1.5s linear infinite;
    }
    .orbiting {
      transform-origin: 50px 50px;
      animation: rotate-orbit 12s linear infinite;
    }
    .orbiting-reverse {
      transform-origin: 50px 50px;
      animation: rotate-orbit 8s linear infinite reverse;
    }
  </style>

  <!-- Background radial glow -->
  <circle cx="50" cy="50" r="35" fill="url(#glow-grad)" />

  <!-- Outer Orbit Tracks -->
  <circle cx="50" cy="50" r="42" stroke="#E95420" stroke-width="1" stroke-opacity="0.15" fill="none" />
  <circle cx="50" cy="50" r="32" stroke="#E95420" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4, 12" fill="none" class="orbiting" />

  <!-- Connected Neural/Circuit Pathways -->
  <g stroke="#E95420" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <!-- Connecting circuit branches -->
    <path d="M 50 18 L 50 28" />
    <path d="M 24 35 L 34 40" />
    <path d="M 76 35 L 66 40" />
    <path d="M 28 68 L 38 62" />
    <path d="M 72 68 L 62 62" />
    <path d="M 50 72 L 50 82" />
  </g>

  <!-- Animated Glowing Data Signals -->
  <g stroke="url(#secondary-grad)" stroke-width="2.5" stroke-linecap="round" fill="none" class="path-stream">
    <path d="M 50 18 L 50 28" />
    <path d="M 24 35 L 34 40" />
    <path d="M 76 35 L 66 40" />
    <path d="M 28 68 L 38 62" />
    <path d="M 72 68 L 62 62" />
    <path d="M 50 72 L 50 82" />
  </g>

  <!-- Central floating byte core (Isometric Cube shape) -->
  <g class="floating-core" filter="url(#neon-glow)">
    <!-- Top Face -->
    <polygon points="50,38 63,45 50,52 37,45" fill="url(#secondary-grad)" />
    <!-- Left Face -->
    <polygon points="37,45 50,52 50,66 37,59" fill="#E95420" opacity="0.9" />
    <!-- Right Face -->
    <polygon points="50,52 63,45 63,59 50,66" fill="#C83C0E" />
    
    <!-- Dynamic detail (inner circuit line on cube face) -->
    <polyline points="50,42 50,52 57,48" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  </g>

  <!-- Neural/Circuit Junction Nodes -->
  <!-- Top Node -->
  <circle cx="50" cy="18" r="4.5" fill="url(#primary-grad)" class="pulsing-node" />
  <circle cx="50" cy="18" r="2" fill="#FFFFFF" />

  <!-- Bottom Node -->
  <circle cx="50" cy="82" r="4.5" fill="url(#primary-grad)" class="pulsing-node" />
  <circle cx="50" cy="82" r="2" fill="#FFFFFF" />

  <!-- Left-Top Node -->
  <circle cx="24" cy="35" r="4" fill="url(#primary-grad)" class="pulsing-node-delayed" />
  <circle cx="24" cy="35" r="1.5" fill="#FFFFFF" />

  <!-- Right-Top Node -->
  <circle cx="76" cy="35" r="4" fill="url(#primary-grad)" class="pulsing-node-delayed" />
  <circle cx="76" cy="35" r="1.5" fill="#FFFFFF" />

  <!-- Left-Bottom Node -->
  <circle cx="28" cy="68" r="4" fill="url(#primary-grad)" class="pulsing-node" />
  <circle cx="28" cy="68" r="1.5" fill="#FFFFFF" />

  <!-- Right-Bottom Node -->
  <circle cx="72" cy="68" r="4" fill="url(#primary-grad)" class="pulsing-node" />
  <circle cx="72" cy="68" r="1.5" fill="#FFFFFF" />

  <!-- Small orbiting data particles -->
  <g class="orbiting-reverse">
    <circle cx="18" cy="50" r="2.5" fill="#FF7A50" opacity="0.8" filter="url(#neon-glow)" />
    <circle cx="82" cy="50" r="2" fill="#FFB095" opacity="0.6" />
  </g>
</svg>