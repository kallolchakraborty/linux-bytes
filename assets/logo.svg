<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="ai-bytes-logo">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A50" />
      <stop offset="100%" stop-color="#E95420" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Global classes */
    .conn-line {
      stroke: #E95420;
      stroke-width: 0.6;
      opacity: 0.12;
      transition: opacity 0.3s;
    }
    html.dark .conn-line {
      opacity: 0.22;
    }

    /* Signal flow animations */
    @keyframes signal-flow {
      0% {
        stroke-dashoffset: 40;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }
    .signal-path {
      stroke: #FF7A50;
      stroke-width: 1.2;
      fill: none;
      stroke-dasharray: 6, 14;
      animation: signal-flow 2.2s linear infinite;
      opacity: 0.75;
      filter: url(#glow);
    }
    .signal-path-2 {
      stroke: #E95420;
      stroke-width: 1.2;
      fill: none;
      stroke-dasharray: 8, 18;
      animation: signal-flow 1.8s linear infinite;
      opacity: 0.8;
      filter: url(#glow);
    }

    /* Node animations */
    @keyframes node-pulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 1px rgba(233, 84, 32, 0.3));
      }
      50% {
        transform: scale(1.15);
        filter: drop-shadow(0 0 5px rgba(233, 84, 32, 0.75));
      }
    }
    .node {
      fill: url(#brand-grad);
      transform-origin: center;
      animation: node-pulse 3s ease-in-out infinite;
    }
    .node-core {
      fill: #FFFFFF;
      opacity: 0.9;
    }

    /* Animation delays for organic/staggered appearance */
    .node-i1 { animation-delay: 0s; transform-origin: 20px 30px; }
    .node-i2 { animation-delay: 0.4s; transform-origin: 20px 50px; }
    .node-i3 { animation-delay: 0.8s; transform-origin: 20px 70px; }

    .node-h1 { animation-delay: 0.2s; transform-origin: 50px 20px; }
    .node-h2 { animation-delay: 0.6s; transform-origin: 50px 40px; }
    .node-h3 { animation-delay: 1.0s; transform-origin: 50px 60px; }
    .node-h4 { animation-delay: 1.4s; transform-origin: 50px 80px; }

    .node-o1 { animation-delay: 0.5s; transform-origin: 80px 38px; }
    .node-o2 { animation-delay: 1.1s; transform-origin: 80px 62px; }
  </style>

  <!-- Connection Lines (Static Background Grid) -->
  <!-- Inputs to Hidden -->
  <line x1="20" y1="30" x2="50" y2="20" class="conn-line" />
  <line x1="20" y1="30" x2="50" y2="40" class="conn-line" />
  <line x1="20" y1="30" x2="50" y2="60" class="conn-line" />
  <line x1="20" y1="30" x2="50" y2="80" class="conn-line" />

  <line x1="20" y1="50" x2="50" y2="20" class="conn-line" />
  <line x1="20" y1="50" x2="50" y2="40" class="conn-line" />
  <line x1="20" y1="50" x2="50" y2="60" class="conn-line" />
  <line x1="20" y1="50" x2="50" y2="80" class="conn-line" />

  <line x1="20" y1="70" x2="50" y2="20" class="conn-line" />
  <line x1="20" y1="70" x2="50" y2="40" class="conn-line" />
  <line x1="20" y1="70" x2="50" y2="60" class="conn-line" />
  <line x1="20" y1="70" x2="50" y2="80" class="conn-line" />

  <!-- Hidden to Outputs -->
  <line x1="50" y1="20" x2="80" y2="38" class="conn-line" />
  <line x1="50" y1="20" x2="80" y2="62" class="conn-line" />

  <line x1="50" y1="40" x2="80" y2="38" class="conn-line" />
  <line x1="50" y1="40" x2="80" y2="62" class="conn-line" />

  <line x1="50" y1="60" x2="80" y2="38" class="conn-line" />
  <line x1="50" y1="60" x2="80" y2="62" class="conn-line" />

  <line x1="50" y1="80" x2="80" y2="38" class="conn-line" />
  <line x1="50" y1="80" x2="80" y2="62" class="conn-line" />

  <!-- Animated Data Flows (Signal Paths) -->
  <path d="M20,30 L50,20 L80,38" class="signal-path" />
  <path d="M20,50 L50,60 L80,62" class="signal-path-2" />
  <path d="M20,70 L50,40 L80,38" class="signal-path" />
  <path d="M20,50 L50,80 L80,62" class="signal-path-2" />

  <!-- Nodes (Neurons) -->
  <!-- Input Layer -->
  <circle cx="20" cy="30" r="4.5" class="node node-i1" />
  <circle cx="20" cy="30" r="1.5" class="node-core" />

  <circle cx="20" cy="50" r="4.5" class="node node-i2" />
  <circle cx="20" cy="50" r="1.5" class="node-core" />

  <circle cx="20" cy="70" r="4.5" class="node node-i3" />
  <circle cx="20" cy="70" r="1.5" class="node-core" />

  <!-- Hidden Layer -->
  <circle cx="50" cy="20" r="4.5" class="node node-h1" />
  <circle cx="50" cy="20" r="1.5" class="node-core" />

  <circle cx="50" cy="40" r="4.5" class="node node-h2" />
  <circle cx="50" cy="40" r="1.5" class="node-core" />

  <circle cx="50" cy="60" r="4.5" class="node node-h3" />
  <circle cx="50" cy="60" r="1.5" class="node-core" />

  <circle cx="50" cy="80" r="4.5" class="node node-h4" />
  <circle cx="50" cy="80" r="1.5" class="node-core" />

  <!-- Output Layer -->
  <circle cx="80" cy="38" r="5" class="node node-o1" />
  <circle cx="80" cy="38" r="1.8" class="node-core" />

  <circle cx="80" cy="62" r="5" class="node node-o2" />
  <circle cx="80" cy="62" r="1.8" class="node-core" />
</svg>