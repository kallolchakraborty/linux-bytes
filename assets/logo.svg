<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="linux-bytes-logo">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A65" />
      <stop offset="50%" stop-color="#E95420" />
      <stop offset="100%" stop-color="#BF360C" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <style>
    .term-bg { fill: #1e293b; rx: 10; }
    .term-title { fill: #E95420; font-family: 'Ubuntu', sans-serif; font-size: 5px; font-weight: 600; }
    .term-text { fill: #e2e8f0; font-family: 'Ubuntu Mono', monospace; font-size: 7px; }
    .prompt { fill: #FF8A65; font-family: 'Ubuntu Mono', monospace; font-size: 8px; font-weight: bold; }
    .cmd { fill: #e2e8f0; font-family: 'Ubuntu Mono', monospace; font-size: 8px; }
    .output { fill: #94a3b8; font-family: 'Ubuntu Mono', monospace; font-size: 6px; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor { fill: #E95420; animation: blink 1s step-end infinite; }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
    .glow-line { stroke: #E95420; stroke-width: 1.5; fill: none; opacity: 0.5; }
    .glow-line-active { stroke: #FF8A65; stroke-width: 1.8; fill: none; filter: url(#glow); animation: pulse-glow 2s ease-in-out infinite; }
    .conn-dot { fill: #E95420; }
    @keyframes dot-pulse { 0%, 100% { r: 2; } 50% { r: 3.5; } }
    .pulse-dot { animation: dot-pulse 2s ease-in-out infinite; fill: #FF8A65; filter: url(#glow); }
  </style>

  <!-- Terminal window background -->
  <rect x="15" y="15" width="70" height="70" class="term-bg" fill="#1e293b" rx="8" />

  <!-- Terminal title bar -->
  <rect x="15" y="15" width="70" height="12" rx="8" fill="#0f172a" />
  <rect x="15" y="22" width="70" height="5" fill="#0f172a" />
  <circle cx="23" cy="21" r="2.5" fill="#FF5F56" />
  <circle cx="30" cy="21" r="2.5" fill="#FFBD2E" />
  <circle cx="37" cy="21" r="2.5" fill="#27C93F" />
  <text x="50" y="24" class="term-title" text-anchor="middle">linux-bytes</text>

  <!-- Connection lines (pipeline motif behind text) -->
  <line x1="20" y1="80" x2="80" y2="80" class="glow-line" />
  <line x1="20" y1="80" x2="40" y2="60" class="glow-line" />
  <line x1="80" y1="80" x2="60" y2="60" class="glow-line" />
  <line x1="40" y1="60" x2="60" y2="60" class="glow-line-active" />

  <!-- Pipeline nodes -->
  <circle cx="40" cy="60" r="2" class="pulse-dot" />
  <circle cx="60" cy="60" r="2" class="pulse-dot" style="animation-delay: 0.7s" />
  <circle cx="20" cy="80" r="1.5" class="conn-dot" />
  <circle cx="80" cy="80" r="1.5" class="conn-dot" />

  <!-- Terminal content -->
  <text x="22" y="42" class="prompt">$</text>
  <text x="32" y="42" class="cmd">grep error log</text>
  <rect x="72" y="36" width="4" height="7" class="cursor" />

  <text x="22" y="52" class="output">▶ output.txt</text>

  <!-- Pipeline text -->
  <text x="22" y="68" class="prompt">$</text>
  <text x="32" y="68" class="cmd">sort | uniq -c</text>

  <!-- Small data flow dots on pipeline -->
  <circle r="1.5" fill="#FF8A65">
    <animateMotion dur="3s" repeatCount="indefinite" path="M40,60 L60,60"/>
  </circle>
  <circle r="1" fill="#E95420" opacity="0.7">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1.5s" path="M40,60 L60,60"/>
  </circle>
</svg>
