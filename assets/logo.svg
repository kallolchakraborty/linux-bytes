<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="ai-bytes-logo">
  <defs>
    <!-- Gradients -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A50" />
      <stop offset="100%" stop-color="#E95420" />
    </linearGradient>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.03); opacity: 1; }
    }
    @keyframes dash {
      to { stroke-dashoffset: -24; }
    }
    .pulsing-group {
      transform-origin: 50px 50px;
      animation: pulse 4s ease-in-out infinite;
    }
    .connection-line {
      stroke: #E95420;
      stroke-width: 1.5;
      stroke-dasharray: 4, 8;
      stroke-linecap: round;
      opacity: 0.35;
      animation: dash 2s linear infinite;
    }
  </style>

  <!-- Dynamic connections (Subtle inner triangle) -->
  <g fill="none">
    <line x1="50" y1="25" x2="22" y2="70" class="connection-line" />
    <line x1="50" y1="25" x2="78" y2="70" class="connection-line" />
    <line x1="22" y1="70" x2="78" y2="70" class="connection-line" />
  </g>

  <!-- Three core sub-circles -->
  <!-- 1. Top Circle: AI/Lightning/Code (50, 25) -->
  <g class="pulsing-group">
    <circle cx="50" cy="25" r="11" fill="url(#brand-grad)" />
    <!-- White symbol inside: Lightning -->
    <path d="M48 18L44 26H52L48 32" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- 2. Bottom-Left Circle: Terminal/Prompt (22, 70) -->
  <g class="pulsing-group">
    <circle cx="22" cy="70" r="11" fill="url(#brand-grad)" />
    <!-- White symbol inside: Terminal Prompt -->
    <path d="M17 66L21 70L17 74" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="22" y1="74" x2="27" y2="74" stroke="#FFF" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- 3. Bottom-Right Circle: Dynamic Clock (78, 70) -->
  <g class="pulsing-group">
    <circle cx="78" cy="70" r="11" fill="url(#brand-grad)" />
    <!-- Clock dial face -->
    <circle cx="78" cy="70" r="8" fill="#FFF" stroke="#E95420" stroke-width="0.5" />
    
    <!-- Clock hands (default pointing to 10:10 if script isn't running) -->
    <!-- Hour hand -->
    <line id="hour-hand" x1="78" y1="70" x2="78" y2="66" stroke="#E95420" stroke-width="1.2" stroke-linecap="round" transform="rotate(300 78 70)" style="transform-origin: 78px 70px;" />
    <!-- Minute hand -->
    <line id="minute-hand" x1="78" y1="70" x2="78" y2="64" stroke="#E95420" stroke-width="0.8" stroke-linecap="round" transform="rotate(60 78 70)" style="transform-origin: 78px 70px;" />
    <!-- Second hand -->
    <line id="second-hand" x1="78" y1="70" x2="78" y2="63" stroke="#FF5B26" stroke-width="0.5" stroke-linecap="round" transform="rotate(180 78 70)" style="transform-origin: 78px 70px;" />
    
    <!-- Center pin -->
    <circle cx="78" cy="70" r="0.8" fill="#E95420" />
  </g>

  <!-- Inline Script (runs when SVG is inline in DOM) -->
  <script type="text/javascript">
    <![CDATA[
    (function() {
      function updateClock() {
        var now = new Date();
        var h = now.getHours() % 12;
        var m = now.getMinutes();
        var s = now.getSeconds();
        var ms = now.getMilliseconds();
        
        var hDeg = (h * 30) + (m * 0.5);
        var mDeg = (m * 6) + (s * 0.1);
        var sDeg = (s * 6) + (ms * 0.006);
        
        // Find elements scoped to this SVG document/element
        var svg = document.getElementById('ai-bytes-logo') || document.querySelector('svg');
        if (svg) {
          var hh = svg.getElementById ? svg.getElementById('hour-hand') : svg.querySelector('#hour-hand');
          var mh = svg.getElementById ? svg.getElementById('minute-hand') : svg.querySelector('#minute-hand');
          var sh = svg.getElementById ? svg.getElementById('second-hand') : svg.querySelector('#second-hand');
          
          if (hh) hh.setAttribute('transform', 'rotate(' + hDeg + ' 78 70)');
          if (mh) mh.setAttribute('transform', 'rotate(' + mDeg + ' 78 70)');
          if (sh) sh.setAttribute('transform', 'rotate(' + sDeg + ' 78 70)');
        }
      }
      setInterval(updateClock, 100);
      updateClock();
    })();
    ]]>
  </script>
</svg>